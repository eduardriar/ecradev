name: Blog Spellcheck with Claude
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'content/blog/**/*.mdx'

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed MDX files
        id: files
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --name-only | grep '\.mdx$' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude spellcheck
        if: steps.files.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHANGED_FILES: ${{ steps.files.outputs.files }}
        run: |
          CHANGED=false
          LOG_FILE=$(mktemp)

          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            [ ! -f "$FILE" ] && continue
            echo "Checking: $FILE"

            CONTENT=$(cat "$FILE")
            echo ">>>>> $ANTHROPIC_API_KEY"

            RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
              -H "x-api-key: $ANTHROPIC_API_KEY" \
              -H "content-type: application/json" \
              -H "anthropic-version: 2023-06-01" \
              -d "$(jq -n \
                --arg content "$CONTENT" \
                '{
                  model: "claude-sonnet-4-20250514",
                  max_tokens: 4000,
                  messages: [{
                    role: "user",
                    content: ("You are a spellchecker for blog posts written in MDX format. Your ONLY job is to fix spelling and accent errors in the text content. Rules:\n1. Fix ONLY spelling and accent mistakes\n2. Do NOT change wording, phrasing, tone, or meaning\n3. Do NOT modify frontmatter values (title, excerpt, etc.)\n4. Do NOT modify code blocks, JSX components, or import statements\n5. Do NOT add or remove content\n6. Return the COMPLETE file exactly as received, only with spelling fixes applied\n7. Do NOT wrap the output in markdown code fences\n8. If there are no errors, return the file unchanged\n\nFile content:\n" + $content)
                  }]
                }')")

            # Check for API errors
            ERROR_TYPE=$(echo "$RESPONSE" | jq -r '.type // empty')
            if [ "$ERROR_TYPE" == "error" ]; then
              ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message')
              echo "::error::Claude API error: $ERROR_MSG"
              exit 1
            fi

            echo ">>>> $RESPONSE"

            CORRECTED=$(echo "$RESPONSE" | jq -r '.content[0].text')

            if [ "$CORRECTED" != "$CONTENT" ] && [ "$CORRECTED" != "null" ]; then
              echo "$CORRECTED" > "$FILE"
              CHANGED=true
              echo "### \`${FILE}\`" >> "$LOG_FILE"
              echo '```diff' >> "$LOG_FILE"
              git diff "$FILE" >> "$LOG_FILE"
              echo '```' >> "$LOG_FILE"
              echo "" >> "$LOG_FILE"
            else
              echo "### \`${FILE}\`" >> "$LOG_FILE"
              echo "No corrections needed." >> "$LOG_FILE"
              echo "" >> "$LOG_FILE"
            fi
          done <<< "$CHANGED_FILES"

          echo "changed=$CHANGED" >> "$GITHUB_ENV"
          echo "LOG_FILE=$LOG_FILE" >> "$GITHUB_ENV"

      - name: Commit corrections
        if: env.changed == 'true'
        run: |
          git config user.name "claude-spellcheck[bot]"
          git config user.email "bot@noreply.github.com"
          git add content/blog/
          git diff --cached --quiet || {
            git commit -m "fix(blog): spelling corrections by Claude"
            git push
          }

      - name: Post review comment
        if: steps.files.outputs.files != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ env.changed }}" == "true" ]; then
            {
              echo "## ✍️ Claude Spellcheck"
              echo ""
              echo "Corrections have been committed to this branch."
              echo ""
              cat "$LOG_FILE"
            } > /tmp/comment.md
          else
            echo "## ✍️ Claude Spellcheck

          All files look good — no spelling errors found." > /tmp/comment.md
          fi

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/comment.md